model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  cache_dir: "models"

data:
  task_name: "all-tasks"
  tasks:
    ioi:
      prompt_types: ["mixed", "letter", "3-person"]
    entity-binding:
      prompt_types: ["2-comma", "2-color-box-comma", "comma-0-position", "comma-7-position"]
    arithmetic:
      prompt_types: ["2-operand-addition", "3-operand-addition", "2-operand-addition-verbal-v1"]
    sequence-completion:
      prompt_types: ["2-gram-symbolic", "3-gram-symbolic", "4-gram-symbolic"]
  n_data: 1000
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
  only_correct: false

paths:
  output_dir: "data/dcd/all-tasks/llama-3.1-8b-instruct"

attribution:
  method: "EAP-IG-inputs"
  ablation: "patching"
  ig_steps: 5
  batch_size: 1
  level: "edge"
  max_examples: null

circuit_creation:
  baseline_methods: ["EAP"]
  random_seed: 42

evaluation:
  test_data: "data/dcd/all-tasks/llama-3.1-8b-instruct/test.csv"